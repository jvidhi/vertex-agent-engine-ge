brand_guidelines = """
# Cymbal | Brand Guideline Document (v1.0)

## 1. Brand Overview
Cymbal is a premium retail brand specializing in handcrafted, sustainably sourced leather goods. We bridge the gap between traditional craftsmanship and modern urban lifestyle.

## 2. Brand Voice
*   **Sophisticated yet Grounded:** We value quality and longevity over fast fashion.
*   **Confident:** We speak with the authority of master craftsmen but remain approachable to the modern city dweller.
*   **Artisanal:** We emphasize the 'human touch' and the unique story behind every piece of leather.

## 3. Visual Identity
*   **Aesthetic:** Warm, rich textures, earth tones, and soft, dramatic lighting.
*   **Photography Style:** High-end lifestyle photography. Think sun-drenched workshops or golden hour in a bustling city.
*   **Focus:** Close-up shots of stitching, grain, and patina to showcase quality.

## 4. Color Palette
*   **Oxblood Red:** #4A0E0E
*   **Desert Sand:** #C2B280
*   **Deep Espresso:** #3D2B1F
*   **Burnished Gold:** #A67C00 (for accents)
"""

